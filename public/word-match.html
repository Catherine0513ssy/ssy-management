<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🍬 英语单词消消乐</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      height: 100vh;
      overflow: hidden;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
      display: flex;
      flex-direction: column;
      padding: 12px;
    }
    
/* ===== 背景动画 ===== */    .bg-animation {      position: fixed;      top: 0; left: 0;      width: 100%; height: 100%;      pointer-events: none;      z-index: 0;      overflow: hidden;    }    /* 漂浮粒子 */    .particle {      position: absolute;      border-radius: 50%;      background: rgba(255, 255, 255, 0.6);      animation: floatUp linear infinite;      box-shadow: 0 0 6px rgba(255, 255, 255, 0.5);    }    @keyframes floatUp {      0% { transform: translateY(100vh) scale(0); opacity: 0; }      10% { opacity: 1; transform: translateY(90vh) scale(1); }      90% { opacity: 1; }      100% { transform: translateY(-10vh) scale(0.5); opacity: 0; }    }    /* 星星闪烁 */    .star {      position: absolute;      width: 4px; height: 4px;      background: white;      border-radius: 50%;      animation: twinkle ease-in-out infinite;      box-shadow: 0 0 8px 2px rgba(255, 255, 255, 0.8), 0 0 16px 4px rgba(255, 255, 200, 0.4);    }    @keyframes twinkle {      0%, 100% { opacity: 0.2; transform: scale(0.5); }      50% { opacity: 1; transform: scale(1.2); }    }
    /* ===== 首页 ===== */
    #home-page {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 16px;
    }
    
    .game-title {
      font-size: clamp(2em, 5vw, 3.5em);
      color: white;
      text-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }
    
    .game-subtitle {
      color: rgba(255,255,255,0.85);
      font-size: 1.1em;
      margin-bottom: 10px;
    }
    
    .mode-cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      max-width: 500px;
      width: 100%;
    }
    
    .mode-card {
      background: rgba(255,255,255,0.95);
      border-radius: 20px;
      padding: 20px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 6px 24px rgba(0,0,0,0.15);
    }
    
    .mode-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 32px rgba(0,0,0,0.2);
    }
    
    .mode-card .emoji { font-size: 2.5em; margin-bottom: 8px; }
    .mode-card h3 { font-size: 1.2em; color: #333; margin-bottom: 4px; }
    .mode-card p { color: #666; font-size: 0.85em; }
    
    .difficulty-section {
      background: rgba(255,255,255,0.9);
      border-radius: 16px;
      padding: 16px 24px;
    }
    
    .difficulty-section h3 {
      color: #333;
      margin-bottom: 12px;
      font-size: 1em;
    }
    
    .difficulty-btns {
      display: flex;
      gap: 10px;
      justify-content: center;
    }
    
    .diff-btn {
      padding: 10px 20px;
      border-radius: 16px;
      border: 2px solid #e2e8f0;
      background: white;
      font-size: 0.9em;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .diff-btn.easy { border-color: #86efac; }
    .diff-btn.medium { border-color: #fbbf24; }
    .diff-btn.hard { border-color: #f87171; }
    .diff-btn.easy.active { background: #86efac; color: #065f46; }
    .diff-btn.medium.active { background: #fbbf24; color: #92400e; }
    .diff-btn.hard.active { background: #f87171; color: white; }
    
    .start-btn {
      padding: 14px 60px;
      border-radius: 20px;
      border: none;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: white;
      font-size: 1.1em;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 6px 24px rgba(34,197,94,0.4);
      transition: transform 0.2s;
    }
    
    .start-btn:hover { transform: translateY(-2px); }
    .start-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    
    /* ===== 游戏页 ===== */
    #game-page {
      display: none;
      height: 100%;
      flex-direction: column;
      gap: 8px;
    }
    
    .game-header {
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(255,255,255,0.95);
      border-radius: 12px;
      padding: 10px 16px;
      flex-shrink: 0;
    }
    
    .score-display {
      font-size: 1.1em;
      font-weight: 700;
      color: #333;
      white-space: nowrap;
    }
    
    .timer-section {
      flex: 1;
    }
    
    .timer-bar {
      height: 10px;
      background: #e2e8f0;
      border-radius: 5px;
      overflow: hidden;
    }
    
    .timer-fill {
      height: 100%;
      background: linear-gradient(90deg, #22c55e, #84efac);
      border-radius: 5px;
      transition: width 0.5s linear, background 0.5s;
    }
    
    .timer-fill.warning { background: linear-gradient(90deg, #f59e0b, #fcd34d); }
    .timer-fill.danger { background: linear-gradient(90deg, #ef4444, #f87171); }
    
    .timer-text {
      text-align: center;
      font-size: 0.8em;
      color: #64748b;
      margin-top: 2px;
    }
    
    .players-status {
      display: flex;
      gap: 12px;
    }
    
    .player-status {
      text-align: center;
      padding: 6px 12px;
      border-radius: 10px;
      background: #f8fafc;
    }
    
    .player-status .label { font-size: 0.75em; color: #64748b; }
    .player-status .score { font-size: 1.1em; font-weight: 700; }
    .player-status.winner { background: #dcfce7; }
    .player-status.winner .score { color: #16a34a; }
    
    /* 牌阵 - 单人 */
    .arena-single {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .card-grid {
      display: grid;
      gap: 6px;
      width: 100%;
      max-width: 1000px;
      padding: 0 4px;
    }
    
    .card-grid.grid-8 { grid-template-columns: repeat(4, 1fr); }
    .card-grid.grid-10 { grid-template-columns: repeat(5, 1fr); }
    .card-grid.grid-12 { grid-template-columns: repeat(6, 1fr); }
    .card-grid.grid-56 { grid-template-columns: repeat(8, 1fr); gap: 5px; }
    .card-grid.grid-70 { grid-template-columns: repeat(7, 1fr); gap: 5px; }
    .card-grid.grid-84 { grid-template-columns: repeat(7, 1fr); gap: 5px; }
    
    /* 牌阵 - 双人 */
    .arena-dual {
      flex: 1;
      display: flex;
      gap: 8px;
    }
    
    .player-side {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    
    .player-side h4 {
      text-align: center;
      color: white;
      background: rgba(0,0,0,0.2);
      padding: 6px;
      border-radius: 10px;
      font-size: 0.95em;
      flex-shrink: 0;
    }
    
    .player-side .card-grid {
      flex: 1;
    }
    
    .player-side .card-grid { grid-template-columns: repeat(2, 1fr); }
    
    .vs-divider {
      display: flex;
      align-items: center;
      font-size: 1.5em;
      color: white;
      font-weight: 800;
      text-shadow: 0 2px 10px rgba(0,0,0,0.3);
    }
    
    /* 卡片 */
    .card {
      background: rgba(255, 255, 255, 0.25);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.4);
      border-radius: 12px;
      padding: 6px 4px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1), inset 0 1px 0 rgba(255, 255, 255, 0.3);
      user-select: none;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(0.75em, 1.4vw, 1em);
      font-weight: 700;
      word-break: break-all;
      line-height: 1.2;
      height: 54px;
      color: #1e293b;
      text-shadow: 0 1px 2px rgba(255, 255, 255, 0.5);
    }
    .card.english {
      background: linear-gradient(135deg, rgba(147, 197, 253, 0.5), rgba(96, 165, 250, 0.5));
      border-color: rgba(147, 197, 253, 0.6);
      color: #1e3a5f;
      text-shadow: 0 1px 3px rgba(255, 255, 255, 0.6);
    .card.chinese {
      background: linear-gradient(135deg, rgba(249, 168, 212, 0.5), rgba(236, 72, 153, 0.5));
      border-color: rgba(249, 168, 212, 0.6);
      color: #4a1a4a;
      text-shadow: 0 1px 3px rgba(255, 255, 255, 0.6);
    }
      color: white;
    }
    
    .card:hover:not(.matched):not(.selected) {
      transform: translateY(-3px) scale(1.03);
      background: rgba(255, 255, 255, 0.4);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15), inset 0 1px 0 rgba(255, 255, 255, 0.5);
      border-color: rgba(255, 255, 255, 0.6);
    }
    
    .card.selected {
      transform: scale(1.06);
      box-shadow: 0 0 0 3px rgba(251, 191, 36, 0.8), 0 0 20px rgba(251, 191, 36, 0.4), 0 8px 24px rgba(0, 0, 0, 0.2);
      border-color: rgba(251, 191, 36, 0.8);
      background: rgba(255, 255, 255, 0.5);
    }
    
    .card.matched {
      opacity: 0;
      transform: scale(0.3);
      pointer-events: none;
      transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .card.wrong {
      animation: glassShake 0.4s ease;
      border-color: rgba(239, 68, 68, 0.8);
      box-shadow: 0 0 0 2px rgba(239, 68, 68, 0.5);
    }
    }
    
    .card.correct {
      animation: glassPop 0.4s ease;
      border-color: rgba(34, 197, 94, 0.8);
      box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.5), 0 0 20px rgba(34, 197, 94, 0.3);
    }
    
    @keyframes glassShake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-6px); }
      40% { transform: translateX(6px); }
      60% { transform: translateX(-4px); }
      80% { transform: translateX(4px); }
    }

    @keyframes glassPop {
      0% { transform: scale(1); }
      50% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }
      50% { transform: scale(1.15); }
      100% { transform: scale(0); opacity: 0; }
    }
    
    /* 得分飘字 */
    .score-popup {
      position: fixed;
      font-size: 1.3em;
      font-weight: 700;
      color: #22c55e;
      pointer-events: none;
      animation: floatUp 0.8s ease forwards;
      z-index: 100;
    }
    
    @keyframes floatUp {
      0% { opacity: 1; transform: translateY(0); }
      100% { opacity: 0; transform: translateY(-50px); }
    }
    
    /* ===== 结果页 ===== */
    #result-page {
      display: none;
      text-align: center;
      background: rgba(255,255,255,0.95);
      border-radius: 24px;
      padding: 30px 40px;
      max-width: 450px;
      width: 100%;
      box-shadow: 0 12px 48px rgba(0,0,0,0.2);
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }
    
    .result-emoji { font-size: 4em; margin-bottom: 12px; }
    .result-title { font-size: 1.8em; color: #333; margin-bottom: 6px; }
    .result-subtitle { color: #666; margin-bottom: 20px; }
    
    .result-stats {
      display: flex;
      justify-content: center;
      gap: 24px;
      margin-bottom: 24px;
    }
    
    .stat-item { text-align: center; }
    .stat-value { font-size: 2em; font-weight: 700; color: #667eea; }
    .stat-label { color: #64748b; font-size: 0.85em; }
    
    .result-actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    
    .btn-retry {
      padding: 12px;
      border-radius: 14px;
      border: none;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      font-size: 1em;
      font-weight: 600;
      cursor: pointer;
    }
    
    .btn-home {
      padding: 10px;
      border-radius: 14px;
      border: 2px solid #e2e8f0;
      background: white;
      color: #64748b;
      font-size: 0.95em;
      cursor: pointer;
    }
    
    /* 加载中 */
    .loading-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
    }
    
    .loading-box {
      background: white;
      padding: 24px 40px;
      border-radius: 16px;
      text-align: center;
    }
    
    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #e2e8f0;
      border-top-color: #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 12px;
    }
    
    @keyframes spin { to { transform: rotate(360deg); } }
    
    /* 重置按钮样式 */
    button:focus { outline: none; }
  </style>
</head>
<body>

  <div class="bg-animation" id="bgAnim"></div>
<!-- 首页 -->
<div id="home-page">
  <h1 class="game-title">🍬 英语单词消消乐</h1>
  <p class="game-subtitle">翻译配对，记单词</p>
  
  <div class="mode-cards">
    <div class="mode-card" onclick="selectMode('single')" id="card-single" style="border: 3px solid #667eea;">
      <div class="emoji">🧑</div>
      <h3>单人模式</h3>
      <p>挑战自己，争分夺秒</p>
    </div>
    <div class="mode-card" onclick="selectMode('dual')" id="card-dual" style="border: 3px solid transparent;">
      <div class="emoji">👫</div>
      <h3>双人模式</h3>
      <p>同屏对战，比拼速度</p>
    </div>
  </div>
  
  <div class="difficulty-section">
    <h3>选择难度</h3>
    <div class="difficulty-btns">
      <button class="diff-btn easy active" onclick="selectDiff('easy')">🌱 初级<br><small>7a · 28对 · 120秒</small></button>
      <button class="diff-btn medium" onclick="selectDiff('medium')">🌿 中级<br><small>8a · 35对 · 150秒</small></button>
      <button class="diff-btn hard" onclick="selectDiff('hard')">🌳 高级<br><small>8b · 42对 · 180秒</small></button>
    </div>
  </div>
  
  <button class="start-btn" id="start-btn" onclick="startGame()">开始游戏</button>
</div>

<!-- 游戏页 -->
<div id="game-page">
  <div class="game-header">
    <div class="score-display" id="score-display">得分: 0</div>
    <div class="timer-section">
      <div class="timer-bar"><div class="timer-fill" id="timer-fill"></div></div>
      <div class="timer-text" id="timer-text">剩余 90 秒</div>
    </div>
    <div class="players-status" id="players-status" style="display:none"></div>
  </div>
  
  <div id="arena"></div>
</div>

<!-- 结果页 -->
<div id="result-page">
  <div class="result-emoji" id="result-emoji">🏆</div>
  <h2 class="result-title" id="result-title">通关成功！</h2>
  <p class="result-subtitle" id="result-subtitle">太棒了！</p>
  <div class="result-stats" id="result-stats">
    <div class="stat-item">
      <div class="stat-value" id="stat-score">0</div>
      <div class="stat-label">得分</div>
    </div>
    <div class="stat-item">
      <div class="stat-value" id="stat-time">0秒</div>
      <div class="stat-label">用时</div>
    </div>
    <div class="stat-item">
      <div class="stat-value" id="stat-correct">0对</div>
      <div class="stat-label">配对</div>
    </div>
  </div>
  <div class="result-actions">
    <button class="btn-retry" onclick="retryGame()">🔄 再玩一次</button>
    <button class="btn-home" onclick="goHome()">返回首页</button>
  </div>
</div>

<!-- 加载中 -->
<div class="loading-overlay" id="loading" style="display:none">
  <div class="loading-box">
    <div class="loading-spinner"></div>
    <div>正在加载单词...</div>
  </div>
</div>

<script>
const CONFIG = {
  easy:   { grade: '7a', pairs: 28, time: 120 },
  medium: { grade: '8a', pairs: 35, time: 150 },
  hard:   { grade: '8b', pairs: 42, time: 180 }
};

const API_BASE = 'http://175.24.181.240:8080';
let wordPool = [];
let currentMode = 'single';
let currentDiff = 'easy';
let gameState = null;
let dualState = null;
let timerInterval = null;

function selectMode(mode) {
  currentMode = mode;
  document.getElementById('card-single').style.border = mode === 'single' ? '3px solid #667eea' : '3px solid transparent';
  document.getElementById('card-dual').style.border = mode === 'dual' ? '3px solid #667eea' : '3px solid transparent';
}

function selectDiff(diff) {
  currentDiff = diff;
  document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.diff-btn.${diff}`).classList.add('active');
}

async function startGame() {
  document.getElementById('loading').style.display = 'flex';
  try {
    wordPool = await fetchWords();
  } catch(e) {
    alert('无法加载单词库，请检查网络');
    document.getElementById('loading').style.display = 'none';
    return;
  }
  document.getElementById('loading').style.display = 'none';
  document.getElementById('home-page').style.display = 'none';
  document.getElementById('game-page').style.display = 'flex';
  document.getElementById('result-page').style.display = 'none';
  if (currentMode === 'single') startSingleGame();
  else startDualGame();
}

async function fetchWords() {
  const token = await login();
  const res = await fetch(`${API_BASE}/api/vocabulary?class_id=1`, {
    headers: { 'Authorization': `Bearer ${token}` }
  });
  const data = await res.json();
  return data.words || [];
}

async function login() {
  const res = await fetch(`${API_BASE}/api/auth/login`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ password: 'Ssy2026' })
  });
  const data = await res.json();
  return data.token;
}

function startSingleGame() {
  const cfg = CONFIG[currentDiff];
  const words = pickWords(cfg.grade, cfg.pairs);
  gameState = {
    score: 0, matched: 0, total: cfg.pairs,
    timeLeft: cfg.time, words, selected: null, combo: 0
  };
  document.getElementById('score-display').textContent = '得分: 0';
  document.getElementById('score-display').style.display = 'block';
  document.getElementById('players-status').style.display = 'none';
  renderArenaSingle(words);
  startTimer();
}

function renderArenaSingle(words) {
  const arena = document.getElementById('arena');
  const gridClass = `card-grid grid-${words.length * 2}`;
  const all = shuffle([
    ...words.map(w => ({...w, id: w.id + '_en', isEnglish: true})),
    ...words.map(w => ({...w, id: w.id + '_cn', isEnglish: false}))
  ]);
  arena.innerHTML = `<div class="arena-single"><div class="${gridClass}" id="grid-single"></div></div>`;
  renderGrid('grid-single', all, 's');
}

function startDualGame() {
  const cfg = CONFIG[currentDiff];
  const words = pickWords(cfg.grade, cfg.pairs);
  dualState = {
    p1: { score: 0, matched: 0, timeLeft: cfg.time, words, selected: null, combo: 0, done: false },
    p2: { score: 0, matched: 0, timeLeft: cfg.time, words: [...words], selected: null, combo: 0, done: false },
    winner: null
  };
  document.getElementById('score-display').style.display = 'none';
  document.getElementById('players-status').style.display = 'flex';
  document.getElementById('players-status').innerHTML = `
    <div class="player-status" id="p1-status"><div class="label">🧑 玩家1</div><div class="score" id="score-p1">0</div></div>
    <div class="player-status" id="p2-status"><div class="label">👩 玩家2</div><div class="score" id="score-p2">0</div></div>
  `;
  renderArenaDual(words);
  startDualTimer();
}

function renderArenaDual(words) {
  const arena = document.getElementById('arena');
  arena.innerHTML = `
    <div class="arena-dual">
      <div class="player-side">
        <h4>🧑 玩家1</h4>
        <div class="card-grid grid-${words.length * 2}" id="grid-p1"></div>
      </div>
      <div class="vs-divider">⚔️</div>
      <div class="player-side">
        <h4>👩 玩家2</h4>
        <div class="card-grid grid-${words.length * 2}" id="grid-p2"></div>
      </div>
    </div>
  `;
  const cards = (ws) => shuffle([
    ...ws.map(w => ({...w, id: w.id + '_en', isEnglish: true})),
    ...ws.map(w => ({...w, id: w.id + '_cn', isEnglish: false}))
  ]);
  renderGrid('grid-p1', cards(words), 'p1');
  renderGrid('grid-p2', cards(words), 'p2');
}

function renderGrid(containerId, cards, prefix) {
  const container = document.getElementById(containerId);
  // JS直接控制列数
  const n = cards.length;
  const cols = n <= 16 ? 4 : n <= 24 ? 5 : n <= 36 ? 6 : n <= 56 ? 8 : 7;
  container.style.gridTemplateColumns = 'repeat(' + cols + ', 1fr)';
  container.style.display = 'grid';
  container.innerHTML = '';
  cards.forEach(card => {
    const el = document.createElement('div');
    el.className = `card ${card.isEnglish ? 'english' : 'chinese'}`;
    el.textContent = card.isEnglish ? card.word : card.meaning;
    el.onclick = () => onCardClick(el, card, prefix);
    container.appendChild(el);
  });
}

function onCardClick(el, card, prefix) {
  if (el.classList.contains('matched')) return;
  let pState;
  if (prefix === 'p1') pState = dualState.p1;
  else if (prefix === 'p2') pState = dualState.p2;
  else pState = gameState;
  
  if (el.classList.contains('selected')) {
    el.classList.remove('selected');
    pState.selected = null;
    return;
  }
  
  if (pState.selected) {
    const prev = pState.selected;
    if (prev.isEnglish !== card.isEnglish && prev.id.replace('_en','').replace('_cn','') === card.id.replace('_en','').replace('_cn','')) {
      prev.el.classList.remove('selected');
      el.classList.add('correct');
      setTimeout(() => { prev.el.classList.add('matched'); el.classList.add('matched'); }, 350);
      const pts = 10 + (pState.combo || 0) * 2;
      pState.score += pts;
      pState.matched++;
      pState.combo = (pState.combo || 0) + 1;
      showScorePopup(el, '+' + pts);
      updateScore(pState, prefix);
      pState.selected = null;
      if (pState.matched >= CONFIG[currentDiff].pairs) {
        if (currentMode === 'dual') {
          pState.done = true;
          if (!dualState.winner) {
            dualState.winner = prefix === 'p1' ? 1 : 2;
            clearInterval(timerInterval);
            showDualResult(prefix);
          }
        } else {
          endGame(pState);
        }
      }
    } else {
      prev.el.classList.remove('selected');
      el.classList.add('wrong');
      pState.score = Math.max(0, pState.score - 3);
      pState.combo = 0;
      updateScore(pState, prefix);
      setTimeout(() => el.classList.remove('wrong'), 350);
      pState.selected = null;
    }
  } else {
    el.classList.add('selected');
    pState.selected = { el, isEnglish: card.isEnglish, id: card.id };
    pState.combo = 0;
  }
}

function updateScore(state, prefix) {
  if (currentMode === 'dual') {
    document.getElementById('score-' + prefix).textContent = state.score;
  } else {
    document.getElementById('score-display').textContent = '得分: ' + state.score;
  }
}

function startTimer() {
  const fill = document.getElementById('timer-fill');
  const cfg = CONFIG[currentDiff];
  let elapsed = 0;
  timerInterval = setInterval(() => {
    elapsed += 0.1;
    const pct = Math.max(0, (cfg.time - elapsed) / cfg.time * 100);
    fill.style.width = pct + '%';
    fill.className = 'timer-fill' + (pct < 20 ? ' danger' : pct < 50 ? ' warning' : '');
    document.getElementById('timer-text').textContent = '剩余 ' + Math.ceil(cfg.time - elapsed) + ' 秒';
    if (elapsed >= cfg.time) {
      clearInterval(timerInterval);
      endGameTimeout();
    }
  }, 100);
}

function startDualTimer() {
  const fill = document.getElementById('timer-fill');
  const cfg = CONFIG[currentDiff];
  let lastTime = Date.now();
  timerInterval = setInterval(() => {
    const now = Date.now();
    const delta = (now - lastTime) / 1000;
    lastTime = now;
    if (dualState.p1.timeLeft > 0) dualState.p1.timeLeft -= delta;
    if (dualState.p2.timeLeft > 0) dualState.p2.timeLeft -= delta;
    const remaining = Math.max(dualState.p1.timeLeft, dualState.p2.timeLeft);
    const pct = Math.max(0, remaining / cfg.time * 100);
    fill.style.width = pct + '%';
    fill.className = 'timer-fill' + (pct < 20 ? ' danger' : pct < 50 ? ' warning' : '');
    document.getElementById('timer-text').textContent = '剩余 ' + Math.ceil(remaining) + ' 秒';
    if (dualState.p1.timeLeft <= 0 && dualState.p2.timeLeft <= 0) {
      clearInterval(timerInterval);
      showDualResult(null);
    }
  }, 100);
}

function endGame(state) {
  clearInterval(timerInterval);
  document.getElementById('result-emoji').textContent = '🎉';
  document.getElementById('result-title').textContent = '通关成功！';
  document.getElementById('result-subtitle').textContent = '太棒了！';
  document.getElementById('stat-score').textContent = state.score;
  document.getElementById('stat-time').textContent = (CONFIG[currentDiff].time - Math.ceil(state.timeLeft)) + '秒';
  document.getElementById('stat-correct').textContent = state.matched + '对';
  showResult();
}

function endGameTimeout() {
  clearInterval(timerInterval);
  const state = gameState;
  document.getElementById('result-emoji').textContent = '⏰';
  document.getElementById('result-title').textContent = '时间到！';
  document.getElementById('result-subtitle').textContent = '完成了 ' + state.matched + ' / ' + state.total + ' 对';
  document.getElementById('stat-score').textContent = state.score;
  document.getElementById('stat-time').textContent = CONFIG[currentDiff].time + '秒';
  document.getElementById('stat-correct').textContent = state.matched + '对';
  showResult();
}

function showDualResult(winnerKey) {
  clearInterval(timerInterval);
  const p1 = dualState.p1, p2 = dualState.p2;
  let winner, msg;
  if (dualState.winner) {
    winner = dualState.winner;
    msg = winner === 1 ? '🧑 玩家1领先一步！' : '👩 玩家2领先一步！';
  } else if (p1.matched > p2.matched) {
    winner = 1; msg = '🧑 玩家1配对更多！';
  } else if (p2.matched > p1.matched) {
    winner = 2; msg = '👩 玩家2配对更多！';
  } else {
    winner = p1.timeLeft > p2.timeLeft ? 1 : 2;
    msg = winner === 1 ? '🧑 玩家1剩余时间更多！' : '👩 玩家2剩余时间更多！';
  }
  document.getElementById('result-emoji').textContent = '🏆';
  document.getElementById('result-title').textContent = '玩家' + winner + ' 获胜！';
  document.getElementById('result-subtitle').textContent = msg;
  document.getElementById('stat-score').textContent = p1.score + ' vs ' + p2.score;
  document.getElementById('stat-time').textContent = Math.ceil(p1.timeLeft) + '秒 vs ' + Math.ceil(p2.timeLeft) + '秒';
  document.getElementById('stat-correct').textContent = p1.matched + '对 vs ' + p2.matched + '对';
  showResult();
}

function showResult() {
  document.getElementById('game-page').style.display = 'none';
  document.getElementById('result-page').style.display = 'block';
}

function retryGame() {
  document.getElementById('result-page').style.display = 'none';
  startGame();
}

function goHome() {
  document.getElementById('result-page').style.display = 'none';
  document.getElementById('game-page').style.display = 'none';
  document.getElementById('home-page').style.display = 'flex';
  clearInterval(timerInterval);
}

function showScorePopup(el, text) {
  const rect = el.getBoundingClientRect();
  const popup = document.createElement('div');
  popup.className = 'score-popup';
  popup.textContent = text;
  popup.style.left = rect.left + rect.width / 2 - 15 + 'px';
  popup.style.top = rect.top + 'px';
  document.body.appendChild(popup);
  setTimeout(() => popup.remove(), 800);
}

function pickWords(grade, count) {
  const filtered = wordPool.filter(w => w.grade === grade);
  
  // Categorize by POS
  const verbs = filtered.filter(w => w.pos === 'verb');
  const adjNouns = filtered.filter(w => w.pos === 'adjective' || w.pos === 'noun');
  const others = filtered.filter(w => w.pos !== 'verb' && w.pos !== 'adjective' && w.pos !== 'noun');
  
  // 70% verbs, 20% adj+noun, 10% random
  const verbCount = Math.floor(count * 0.7);
  const adjNounCount = Math.floor(count * 0.2);
  const randomCount = count - verbCount - adjNounCount; // usually 10%
  
  const selectedVerbs = shuffle(verbs).slice(0, Math.min(verbCount, verbs.length));
  const selectedAdjNouns = shuffle(adjNouns).slice(0, Math.min(adjNounCount, adjNouns.length));
  const selectedOthers = shuffle(others).slice(0, Math.min(randomCount, others.length));
  
  // Combine
  let selected = [...selectedVerbs, ...selectedAdjNouns, ...selectedOthers];
  
  // Fill remaining slots with any available words if needed
  if (selected.length < count) {
    const remaining = filtered.filter(w => !selected.includes(w));
    const needed = count - selected.length;
    selected.push(...shuffle(remaining).slice(0, needed));
  }
  
  return shuffle(selected);
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
